# Configuration de projet minilang — fichier optionnel.
# Sans ce fichier : comportement par défaut (tous les modules DI actifs,
# log "info", fichier source obligatoire en argument).

[project]
name = "demo-config"
main = "app.mini"          # point d'entrée si aucun fichier passé en argument

[sources]
include = ["lib.mini"]     # code partagé, préfixé en mode run ET en mode test

[di]
# Profil actif en exécution normale.
modules = ["ProdModule"]

[tests]
dir = "tests"              # répertoire des fichiers de tests (défaut : "tests")
modules = ["TestModule"]   # profil DI des tests : les mocks

[runtime]
log = "warn"               # RUST_LOG reste prioritaire
